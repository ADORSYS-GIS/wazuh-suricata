name: Suricata CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/**'

env:
  WAZUH_SURICATA_REPO_REF: main

jobs:
  update-changelog-and-checksums:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: "0"
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Configure git user
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      - name: Generate script checksums
        run: |
          find scripts \( -path "scripts/tests" -o -path "scripts/tests/*" \) -prune -o -type f -exec sha256sum {} + > checksums.sha256
          cat checksums.sha256
          
      - name: Generate full CHANGELOG.md
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
          
      - name: Commit and push changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add CHANGELOG.md checksums.sha256
            git commit -m "docs: update CHANGELOG.md and checksums [skip ci]"
            git push origin ${{ github.head_ref || github.ref_name }}
          else
            echo "No changes to commit"
          fi

  test-ids:
    needs: update-changelog-and-checksums
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          sudo apt-get update
          sudo apt-get install -y bats curl jq sed
        elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          brew install bats coreutils curl jq gnu-sed
        fi

    - name: Install Wazuh agent
      run: |
        curl -sfL https://raw.githubusercontent.com/adorsys-gis/wazuh-agent/main/scripts/install.sh | sudo WAZUH_MANAGER=127.0.0.1 bash

    - name: Make script executable
      run: |
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          chmod +x ./scripts/linux/install.sh
        elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          chmod +x ./scripts/macos/install.sh
        fi

    - name: Install Suricata
      run: |
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          sudo env WAZUH_SURICATA_REPO_REF=${{ env.WAZUH_SURICATA_REPO_REF }} ./scripts/linux/install.sh
        elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          sudo env WAZUH_SURICATA_REPO_REF=${{ env.WAZUH_SURICATA_REPO_REF }} ./scripts/macos/install.sh
        fi

    - name: Run Bats tests
      run: sudo bats tests/

  test-ips:
    runs-on: ubuntu-latest
    needs: test-ids

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bats curl jq sed

    - name: Install Wazuh agent
      run: |
        curl -sfL https://raw.githubusercontent.com/adorsys-gis/wazuh-agent/main/scripts/install.sh | sudo WAZUH_MANAGER=127.0.0.1 bash

    - name: Make script executable
      run: chmod +x ./scripts/linux/install.sh

    - name: Install Suricata in IPS mode
      run: sudo env WAZUH_SURICATA_REPO_REF=${{ env.WAZUH_SURICATA_REPO_REF }} ./scripts/linux/install.sh --mode ips

    - name: Run Bats tests for IPS mode
      run: sudo env WAZUH_SURICATA_REPO_REF=${{ env.WAZUH_SURICATA_REPO_REF }} MODE=ips bats tests/

  release:
    name: Release
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    needs: test-ips
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"
          persist-credentials: 'false'

      - name: Get the version
        id: get_version
        run: echo ::set-output name=VERSION::${GITHUB_REF#refs/tags/}

      - name: Generate script checksums
        run: |
          find scripts -type f -exec sha256sum {} + >> checksums.sha256
          cat checksums.sha256

      - name: Generate release notes (latest only)
        id: git_cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/release-notes.md

      - name: Determine prerelease
        id: prerelease
        run: |
          if [[ "${GITHUB_REF#refs/tags/}" == *"rc"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          files: checksums.sha256
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.git_cliff.outputs.content }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.PRERELEASE }}
